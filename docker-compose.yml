version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
        - NEXT_PUBLIC_STELLAR_NETWORK=$NEXT_PUBLIC_STELLAR_NETWORK
        - NEXT_PUBLIC_SOROBAN_RPC_URL=$NEXT_PUBLIC_SOROBAN_RPC_URL
        - NEXT_PUBLIC_HORIZON_URL=$NEXT_PUBLIC_HORIZON_URL
        - NEXT_PUBLIC_NFT_CONTRACT_ID=$NEXT_PUBLIC_NFT_CONTRACT_ID
        - NEXT_PUBLIC_VERIFIER_CONTRACT_ID=$NEXT_PUBLIC_VERIFIER_CONTRACT_ID
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
      - NEXT_PUBLIC_STELLAR_NETWORK=$NEXT_PUBLIC_STELLAR_NETWORK
      - NEXT_PUBLIC_SOROBAN_RPC_URL=$NEXT_PUBLIC_SOROBAN_RPC_URL
      - NEXT_PUBLIC_HORIZON_URL=$NEXT_PUBLIC_HORIZON_URL
      - NEXT_PUBLIC_NFT_CONTRACT_ID=$NEXT_PUBLIC_NFT_CONTRACT_ID
      - NEXT_PUBLIC_VERIFIER_CONTRACT_ID=$NEXT_PUBLIC_VERIFIER_CONTRACT_ID
      - ADMIN_WALLET_ADDRESS=$ADMIN_WALLET_ADDRESS
      - ADMIN_MAIL=$ADMIN_MAIL
      - ADMIN_EMAIL=$ADMIN_EMAIL
    env_file:
      - .env
